  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #0d0d14; color: #e2e8f0; font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d14; }
    ::-webkit-scrollbar-thumb { background: #252536; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #818cf8; }

    /* ── Tab Transition ───────────────────────────────────── */
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tab-enter { animation: tabFadeIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards; }

    /* ── Spin ring ────────────────────────────────────────── */
    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spin-ring { animation: spin-ring 8s linear infinite; }

    @keyframes hud-fadein { from { opacity:0; } to { opacity:1; } }
    .hud-appear { animation: hud-fadein 1s ease forwards; }

      0%   { top: 58px; opacity: 0; }
      3%   { opacity: 0.35; }
      97%  { opacity: 0.08; }
      100% { top: calc(100% - 110px); opacity: 0; }

      0%,100% { opacity:1; box-shadow: 0 0 5px #22c55e; }
      50%      { opacity:0.4; box-shadow: none; }

    .wave-3 { animation: wave-drift  6s linear infinite; }

      border-radius: 16px; padding: 2px;
      background: linear-gradient(180deg, #818cf8 0%, #a78bfa 25%, #fbbf24 50%, #f9a8d4 75%, #818cf8 100%);

      animation: border-flow 3s linear infinite, pin-glow 2.5s ease-in-out infinite;

    .flip-card { perspective: 700px; }
    .flip-inner { transition: transform 0.65s; transform-style: preserve-3d; position: relative; min-height: 108px; }
    .flip-card:hover .flip-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; }
    .flip-back { position: absolute; top:0; left:0; right:0; transform: rotateY(180deg); padding-top: 4px; }

    .op-em    { display:inline-block; animation: bounce-op 1.8s ease-in-out infinite; }
    .game-em  { display:inline-block; animation: pulse-g 2.5s ease-in-out infinite; }

    .terminal-body::-webkit-scrollbar { width: 4px; }

      background: #171723; border: 1px solid #252536; border-radius: 12px;

/* ═══════════════════════════════════════════════════════════
   STARFIELD HOOK
═══════════════════════════════════════════════════════════ */
function useStarfield(enabled) {
  const canvasRef = useRef(null);
  const heroRef   = useRef(null);
  const stateRef  = useRef({ mx: 0, my: 0, lx: 0, ly: 0, t: 0, particles: [], lastSpawn: 0, animId: null });
  const [coords, setCoords] = useState({ x: '0000', y: '0000' });

  useEffect(() => {
    if (!enabled) return;
    const canvas = canvasRef.current;
    const hero   = heroRef.current;
    if (!canvas || !hero) return;

    const ctx = canvas.getContext('2d');
    let W, H;
    const s = stateRef.current;

    function resize() {
      W = canvas.width  = hero.offsetWidth;
      H = canvas.height = hero.offsetHeight;
      s.mx = W / 2; s.my = H / 2; s.lx = W / 2; s.ly = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    const LAYER_DEFS = [
      { parallax: 0.018, sizeMin: 0.4, sizeMax: 1.1, alphaMin: 0.25, alphaMax: 0.65 },
      { parallax: 0.038, sizeMin: 0.9, sizeMax: 1.9, alphaMin: 0.40, alphaMax: 0.85 },
      { parallax: 0.07,  sizeMin: 1.5, sizeMax: 3.2, alphaMin: 0.55, alphaMax: 1.00 },
    ];
    const COLORS = ['#e8eaf6','#e8eaf6','#e8eaf6','#fbbf24','#a78bfa','#93c5fd'];
    const TRAIL_COLORS = ['#818cf8','#a5b4fc','#fbbf24','#f9a8d4','#ffffff'];

    const stars = Array.from({ length: 220 }, () => {
      const L = LAYER_DEFS[Math.floor(Math.random() * 3)];
      return {
        nx: Math.random(), ny: Math.random(),
        size: L.sizeMin + Math.random() * (L.sizeMax - L.sizeMin),
        baseAlpha: L.alphaMin + Math.random() * (L.alphaMax - L.alphaMin),
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        parallax: L.parallax,
        tSpeed: 0.4 + Math.random() * 1.8,
        tPhase: Math.random() * Math.PI * 2,
      };
    });

    function spawnParticles(x, y) {
      for (let i = 0; i < 2; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 0.4 + Math.random() * 1.2;
        s.particles.push({
          x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 0.6,
          life: 1, decay: 0.025 + Math.random() * 0.04,
          size: 0.8 + Math.random() * 2.2,
          color: TRAIL_COLORS[Math.floor(Math.random() * 5)],
        });
      }
    }

    function onMouseMove(e) {
      const r = canvas.getBoundingClientRect();
      s.mx = e.clientX - r.left;
      s.my = e.clientY - r.top;
      setCoords({ x: String(Math.floor(e.clientX)).padStart(4,'0'), y: String(Math.floor(e.clientY)).padStart(4,'0') });
      const now = Date.now();
      if (now - s.lastSpawn > 35) { spawnParticles(s.mx, s.my); s.lastSpawn = now; }
    }

    hero.addEventListener('mousemove', onMouseMove);

    function draw() {
      s.animId = requestAnimationFrame(draw);
      s.t += 0.016;
      s.lx += (s.mx - s.lx) * 0.04;
      s.ly += (s.my - s.ly) * 0.04;
      ctx.clearRect(0, 0, W, H);

      const offX = (s.lx - W * 0.5) / W;
      const offY = (s.ly - H * 0.5) / H;

      stars.forEach(star => {
        const px = ((star.nx * W + offX * star.parallax * W * 2) % W + W) % W;
        const py = ((star.ny * H + offY * star.parallax * H * 1.5) % H + H) % H;
        const twinkle = 0.5 + 0.5 * Math.sin(s.t * star.tSpeed + star.tPhase);
        const alpha = star.baseAlpha * (0.55 + 0.45 * twinkle);
        ctx.globalAlpha = alpha;
        if (star.size > 2.2) {
          const g = ctx.createRadialGradient(px, py, 0, px, py, star.size * 2.8);
          g.addColorStop(0, star.color); g.addColorStop(0.4, star.color + '88'); g.addColorStop(1, 'transparent');
          ctx.beginPath(); ctx.arc(px, py, star.size * 2.8, 0, Math.PI*2);
          ctx.fillStyle = g; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(px, py, star.size, 0, Math.PI*2);
        ctx.fillStyle = star.color; ctx.fill();
      });

      for (let i = s.particles.length - 1; i >= 0; i--) {
        const p = s.particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
        if (p.life <= 0) { s.particles.splice(i, 1); continue; }
        ctx.globalAlpha = Math.pow(p.life, 1.5) * 0.85;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    draw();

    return () => {
      window.removeEventListener('resize', resize);
      hero.removeEventListener('mousemove', onMouseMove);
      if (s.animId) cancelAnimationFrame(s.animId);
    };
  }, [enabled]);

  return { canvasRef, heroRef, coords };
}

function useTerminal() {
  const [lines, setLines] = useState([]);
  const termRef = useRef(null);
  const idxRef  = useRef(0);

  useEffect(() => {
    const initial = TERM_POOL.slice(0, 4).map((l, i) => ({ ...l, id: i, ts: timestamp() }));
    setLines(initial);
    idxRef.current = 4;

    const iv = setInterval(() => {
      const idx = idxRef.current % TERM_POOL.length;
      idxRef.current++;
      setLines(prev => {
        const next = [...prev, { ...TERM_POOL[idx], id: Date.now(), ts: timestamp() }];
        return next.length > 30 ? next.slice(-30) : next;
      });
    }, 1800);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [lines]);

  return { lines, termRef };
}

function timestamp() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

/* ═══════════════════════════════════════════════════════════
   COUNT-UP HOOK
═══════════════════════════════════════════════════════════ */
function CountUp({ target, decimals=0, suffix='' }) {
  const [val, setVal] = useState('0');
  const elRef = useRef(null);
  const animated = useRef(false);

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting || animated.current) return;
      animated.current = true;
      const start = performance.now();
      const dur = 1200;
      function tick(now) {
        const p = Math.min((now - start) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        setVal((target * ease).toFixed(decimals) + suffix);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, { threshold: 0.5 });
    if (elRef.current) obs.observe(elRef.current);
    return () => obs.disconnect();
  }, [target, decimals, suffix]);

  return <span ref={elRef}>{val}</span>;
}

function parsePos(str) {
  const out = {};
  str.split(' ').forEach(s => {
    const [k, v] = s.split('-').length === 2 ? [s.split('-')[0], s.split('-')[1]] : ['', ''];
    if (k === 'top')    out.top    = v === '16' ? '64px' : v === '28' ? '112px' : v;
    if (k === 'bottom') out.bottom = v === '28' ? '112px' : v;
    if (k === 'left')   out.left   = v === '4'  ? '16px'  : v;
    if (k === 'right')  out.right  = v === '4'  ? '16px'  : v;
    if (k === 'top' && v === '0') out.top = 0;
    if (k === 'bottom' && v === '0') out.bottom = 0;
    if (k === 'right' && v === '0') out.right = 0;
    if (k === 'left' && v === '0') out.left = 0;
  });
  return out;
}

function ProjectCard({ project }) {
  const [visible, setVisible] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); }}, {threshold:0.07});
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  return (
    <div ref={ref} className={`pcard-wrap relative ${visible ? 'sfi vis' : 'sfi'}`}>
      <div style={{
        background:'#171723', border:'1px solid #252536', borderRadius:'14px',
        padding:'26px 28px', transition:'all 0.25s', position:'relative', overflow:'hidden',

        onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(129,140,248,0.35)'; e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,0.45)'; e.currentTarget.style.transform='translateY(-2px)'; }}

        {/* Gradient top accent on hover — via ::after workaround with a div */}
        <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:'linear-gradient(90deg, #818cf8 0%, transparent 65%)'}}/>

        <div className="flex justify-between items-start gap-3 mb-3">
          <div>
            <div style={{fontSize:'0.68rem', fontWeight:700, color:'#818cf8', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:'4px'}}>{project.badge}</div>
            <div style={{fontSize:'1rem', fontWeight:700, color:'#e2e8f0'}}>{project.title}</div>

          {project.links.length > 0 && (
